    // ========== FUNCIONES DE PERSISTENCIA ==========
    function cargarDatos() {
      const guardados = localStorage.getItem(STORAGE_KEY);
      if (guardados) {
        try {
          const datos = JSON.parse(guardados);
          products = datos.products || [];
          movimientos = datos.movimientos || [];
          nextId = datos.nextId || 100;
        } catch (e) {
          products = JSON.parse(JSON.stringify(initialProducts));
          movimientos = [];
          nextId = 100;
        }
      } else {
        products = JSON.parse(JSON.stringify(initialProducts));
        movimientos = [];
        nextId = 100;
      }
    }

    function guardarDatos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        products: products,
        movimientos: movimientos,
        nextId: nextId
      }));
      document.getElementById('persistenciaMsg').innerHTML = '💾 guardado ✓';
      setTimeout(() => {
        document.getElementById('persistenciaMsg').innerHTML = '💾 auto-save activado';
      }, 2000);
    }

    // ========== RESET A CERO ==========
    function resetToCero() {
      const password = prompt('🔐 Ingresa la contraseña para poner todo a CERO:');
      if (password !== RESET_PASSWORD) {
        alert('❌ Contraseña incorrecta');
        return;
      }

      if (confirm('¿Estás SEGURO? Todos los productos quedarán con valores CERO.')) {
        products.forEach(p => {
          p.precioVenta = 0;
          p.precioCosto = 0;
          p.saldoInicialCant = 0;
          p.saldoInicialImp = 0;
          p.entradaCant = 0;
          p.entradaImp = 0;
          p.salidaCant = 0;

        setTimeout(setupEventListeners, 100);

    // ========== LÓGICA MATEMÁTICA ==========
    function actualizarProducto(product, campoModificado) {
      const p = product;
      
      if (campoModificado === 'precioCosto') {
        p.saldoInicialImp = p.saldoInicialCant * p.precioCosto;
        p.entradaImp = p.entradaCant * p.precioCosto;
        p.saldoFinalImp = p.saldoFinalCant * p.precioCosto;
      }
      
      if (campoModificado === 'precioVenta') {
        p.salidaPrecio = p.precioVenta;
        p.ventaImp = p.ventaCant * p.precioVenta;
      }
      
      if (campoModificado === 'saldoInicialCant') {
        p.saldoInicialImp = p.saldoInicialCant * p.precioCosto;
      }
      
      if (campoModificado === 'entradaCant') {
        p.entradaImp = p.entradaCant * p.precioCosto;
      }
      
      if (campoModificado === 'salidaCant') {
        p.salidaPrecio = p.precioVenta;
        if (p.ventaCant !== p.salidaCant) {
          p.ventaCant = p.salidaCant;
          p.ventaImp = p.ventaCant * p.precioVenta;
        }
      }
      
      if (campoModificado === 'ventaCant') {
        p.ventaImp = p.ventaCant * p.precioVenta;
        if (p.salidaCant !== p.ventaCant) {
          p.salidaCant = p.ventaCant;
          p.salidaPrecio = p.precioVenta;
        }
      }
      
      p.saldoFinalCant = p.saldoInicialCant + p.entradaCant - p.salidaCant;
      p.saldoFinalImp = p.saldoFinalCant * p.precioCosto;
      
      p.saldoInicialImp = Math.round(p.saldoInicialImp * 100) / 100;
      p.entradaImp = Math.round(p.entradaImp * 100) / 100;
      p.ventaImp = Math.round(p.ventaImp * 100) / 100;
      p.saldoFinalImp = Math.round(p.saldoFinalImp * 100) / 100;
    }

    function formatNumber(num) {
      if (num === undefined || num === null) return '0';
      if (Number.isInteger(num)) return num.toString();
      return num.toFixed(2).replace(/\.00$/, '');
    }

    function calcularGanancias() {
      let totalVentas = 0;
      let totalCostoVentas = 0;

      products.forEach(p => {
        totalVentas += p.ventaImp || 0;
        totalCostoVentas += (p.ventaCant || 0) * p.precioCosto;
      });

      totalCostoVentas = Math.round(totalCostoVentas * 100) / 100;
      const ganancia = totalVentas - totalCostoVentas;
      const porcentaje = totalVentas > 0 ? (ganancia / totalVentas) * 100 : 0;

      return {
        ganancia: Math.round(ganancia * 100) / 100,
        porcentaje: Math.round(porcentaje * 100) / 100
      };
    }

    function addNewProduct() {
      const nombre = document.getElementById('newProductName').value.trim();
      if (!nombre) {
        alert('Ingresa un nombre');
        return;
      }

      const nuevoProducto = {
        id: nextId++,
        descripcion: nombre,
        um: 'ud',
        precioVenta: 0,
        precioCosto: 0,
        saldoInicialCant: 0,
        saldoInicialImp: 0,
        entradaCant: 0,
        entradaImp: 0,
        salidaCant: 0,
        salidaPrecio: 0,
        ventaCant: 0,
        ventaImp: 0,
        saldoFinalCant: 0,
        saldoFinalImp: 0
      };

      products.push(nuevoProducto);
      
      movimientos.push({
        fecha: new Date().toISOString(),
        tipo: '➕ Nuevo producto',
        descripcion: nombre,
        cantidad: 0
      });

      document.getElementById('newProductName').value = '';
      guardarDatos();
      renderAll();
      setTimeout(setupEventListeners, 100);
    }

    function renderAll() {
      const tbody = document.getElementById('productTableBody');
      tbody.innerHTML = '';

      const sortedProducts = [...products].sort((a, b) => a.id - b.id);

      sortedProducts.forEach((prod, index) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td class="product-name" contenteditable="true" data-id="${prod.id}" data-field="descripcion">${prod.descripcion}</td>
          <td contenteditable="true" data-id="${prod.id}" data-field="um">${prod.um || 'ud'}</td>
          <td><input type="number" class="editable-input" value="${prod.precioVenta}" data-id="${prod.id}" data-field="precioVenta" min="0" step="0.01"></td>
          <td><input type="number" class="editable-input" value="${prod.precioCosto}" data-id="${prod.id}" data-field="precioCosto" min="0" step="0.01"></td>
          <td><input type="number" class="editable-input" value="${prod.saldoInicialCant}" data-id="${prod.id}" data-field="saldoInicialCant" min="0" step="0.01"></td>
          <td><input type="number" class="readonly-input" value="${formatNumber(prod.saldoInicialImp)}" readonly></td>
          <td><input type="number" class="editable-input" value="${prod.entradaCant}" data-id="${prod.id}" data-field="entradaCant" min="0" step="0.01"></td>
          <td><input type="number" class="readonly-input" value="${formatNumber(prod.entradaImp)}" readonly></td>
          <td><input type="number" class="editable-input" value="${prod.salidaCant}" data-id="${prod.id}" data-field="salidaCant" min="0" step="0.01"></td>
          <td><input type="number" class="readonly-input" value="${formatNumber(prod.precioVenta)}" readonly></td>
          <td><input type="number" class="editable-input" value="${prod.ventaCant}" data-id="${prod.id}" data-field="ventaCant" min="0" step="0.01"></td>
          <td><input type="number" class="readonly-input" value="${formatNumber(prod.ventaImp)}" readonly></td>
          <td><input type="number" class="readonly-input" value="${formatNumber(prod.saldoFinalCant)}" readonly></td>
          <td><input type="number" class="readonly-input" value="${formatNumber(prod.saldoFinalImp)}" readonly></td>
        `;
        tbody.appendChild(tr);
      });

      // ===== FILA DE TOTALES (suma de todas las columnas) =====
      const totalRow = document.createElement('tr');
      totalRow.className = 'total-row';
      totalRow.innerHTML = `
        <td></td>
        <td><strong>TOTALES</strong></td>
        <td></td>
        <td></td>
        <td></td>
        <td>${formatNumber(products.reduce((sum, p) => sum + p.saldoInicialCant, 0))}</td>
        <td>${formatNumber(products.reduce((sum, p) => sum + p.saldoInicialImp, 0))}</td>
        <td>${formatNumber(products.reduce((sum, p) => sum + p.entradaCant, 0))}</td>
        <td>${formatNumber(products.reduce((sum, p) => sum + p.entradaImp, 0))}</td>
        <td>${formatNumber(products.reduce((sum, p) => sum + p.salidaCant, 0))}</td>
        <td></td> <!-- Precio no se suma -->
        <td>${formatNumber(products.reduce((sum, p) => sum + p.ventaCant, 0))}</td>
        <td>${formatNumber(products.reduce((sum, p) => sum + p.ventaImp, 0))}</td>
        <td>${formatNumber(products.reduce((sum, p) => sum + p.saldoFinalCant, 0))}</td>
        <td>${formatNumber(products.reduce((sum, p) => sum + p.saldoFinalImp, 0))}</td>
      `;
      tbody.appendChild(totalRow);

      // ===== FILA DE GANANCIAS NETAS =====
      const ganancias = calcularGanancias();
      const gananciaRow = document.createElement('tr');
      gananciaRow.className = 'ganancia-row';
      gananciaRow.innerHTML = `
        <td></td>
        <td><strong>GANANCIAS NETAS</strong></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td></td>
        <td>${ganancias.ganancia.toFixed(2)} CUP</td>
        <td>PORCENTAJE</td>
        <td>${ganancias.porcentaje.toFixed(2)}%</td>
      `;
      tbody.appendChild(gananciaRow);

      // Actualizar badge
      document.getElementById('totalProductsBadge').innerText = products.length + ' productos';

      // Actualizar movimientos
      const movList = document.getElementById('movimientosList');
      movList.innerHTML = '';
      if (movimientos.length === 0) {
        movList.innerHTML = '<li style="opacity:0.6;">— sin movimientos —</li>';
      } else {
        movimientos.slice(-10).reverse().forEach(m => {
          const li = document.createElement('li');
          if (m.tipo.includes('Venta') || m.cantidad > 0) {
            li.innerHTML = `<span><span class="log-product">${m.descripcion}</span> ${m.tipo}</span> 
                            <span class="log-quantity">${m.cantidad} uds</span>`;
          } else {
            li.innerHTML = `<span>${m.tipo}: ${m.descripcion}</span> 
                            <span class="log-quantity">${m.cantidad}</span>`;
          }
          movList.appendChild(li);
        });
      }
    }

    function handleInputChange(e) {
      const id = parseInt(this.dataset.id);
      const field = this.dataset.field;
      const value = parseFloat(this.value) || 0;
      
      const product = products.find(p => p.id === id);
      if (product) {
        const oldValue = product[field];
        product[field] = value;
        
        actualizarProducto(product, field);
        
        if (field.includes('Cant') && value !== oldValue) {
          let tipoMov = field.replace('Cant', '').replace(/([A-Z])/g, ' $1').trim();
          if (tipoMov === 'salida' || tipoMov === 'venta') {
            tipoMov = 'Venta';
          } else if (tipoMov === 'entrada') {
            tipoMov = 'Entrada';
          }
          
          movimientos.push({
            fecha: new Date().toISOString(),
            tipo: tipoMov,
            descripcion: product.descripcion,
            cantidad: value
          });
        }
        
        guardarDatos();
        renderAll();
        setTimeout(setupEventListeners, 100);
      }
    }

    function handleBlur(e) {
      const id = parseInt(this.dataset.id);
      const field = this.dataset.field;
      const value = this.innerText.trim();
      
      const product = products.find(p => p.id === id);
      if (product && product[field] !== value) {
        product[field] = value;
        guardarDatos();
      }
    }

    function setupEventListeners() {
      document.querySelectorAll('.editable-input').forEach(input => {
        input.removeEventListener('change', handleInputChange);
        input.addEventListener('change', handleInputChange);
      });

      document.querySelectorAll('[contenteditable="true"]').forEach(el => {
        el.removeEventListener('blur', handleBlur);
        el.addEventListener('blur', handleBlur);
      });
    }

    function resetAllData() {
      if (confirm('¿Resetear a los datos originales de ejemplo?')) {
        products = JSON.parse(JSON.stringify(initialProducts));
        movimientos = [];
        nextId = 100;
        guardarDatos();
        renderAll();
        setTimeout(setupEventListeners, 100);
      }
    }

    function downloadPDF() {
      const doc = new jsPDF({
        orientation: 'landscape',
        unit: 'mm',
        format: 'a4'
      });

      const now = new Date();
      const fechaHora = now.toLocaleDateString('es-CU') + ' ' + now.toLocaleTimeString('es-CU');
      const ganancias = calcularGanancias();
      
      doc.setFontSize(16);
      doc.setTextColor(0, 0, 0);
      doc.setFont('helvetica', 'bold');
      doc.text('IPV DE VENTA - REPORTE DIARIO', 14, 10);
      
      doc.setFontSize(8);
      doc.text(`Generado: ${fechaHora}`, 14, 16);
      doc.text(`UEB #: _______________`, 140, 16);
      doc.text(`Productos: ${products.length}`, 240, 16);

      const tableColumn = [
        'No.', 'Descripción', 'U/M', 'P.Vta', 'P.Costo',
        'Saldo inicial', '', 'Entrada', '', 'Salida', '', 'Venta', '', 'Saldo final', ''
      ];
      
      const subColumnas = [
        '', '', '', '', '', 'Cant', 'Imp', 'Cant', 'Imp', 'Cant', 'Precio', 'Cant', 'Total', 'Cant', 'Imp'
      ];

      const tableRows = [];
      
      products.sort((a, b) => a.id - b.id).forEach((p, index) => {
        tableRows.push([
          (index + 1).toString(),
          p.descripcion,
          p.um || 'ud',
          p.precioVenta.toFixed(2),
          p.precioCosto.toFixed(2),
          formatNumber(p.saldoInicialCant),
          formatNumber(p.saldoInicialImp),
          formatNumber(p.entradaCant),
          formatNumber(p.entradaImp),
          formatNumber(p.salidaCant),
          formatNumber(p.precioVenta),
          formatNumber(p.ventaCant),
          formatNumber(p.ventaImp),
          formatNumber(p.saldoFinalCant),
          formatNumber(p.saldoFinalImp)
        ]);
      });

      // Fila de totales
      tableRows.push([
        '', 'TOTALES', '', '', '',
        formatNumber(products.reduce((sum, p) => sum + p.saldoInicialCant, 0)),
        formatNumber(products.reduce((sum, p) => sum + p.saldoInicialImp, 0)),
        formatNumber(products.reduce((sum, p) => sum + p.entradaCant, 0)),
        formatNumber(products.reduce((sum, p) => sum + p.entradaImp, 0)),
        formatNumber(products.reduce((sum, p) => sum + p.salidaCant, 0)),
        '',
        formatNumber(products.reduce((sum, p) => sum + p.ventaCant, 0)),
        formatNumber(products.reduce((sum, p) => sum + p.ventaImp, 0)),
        formatNumber(products.reduce((sum, p) => sum + p.saldoFinalCant, 0)),
        formatNumber(products.reduce((sum, p) => sum + p.saldoFinalImp, 0))
      ]);

      // Fila de ganancias netas
      tableRows.push([
        '', 'GANANCIAS NETAS', '', '', '',
        '', '', '', '', '', '', '',
        ganancias.ganancia.toFixed(2) + ' CUP',
        'PORCENTAJE',
        ganancias.porcentaje.toFixed(2) + '%'
      ]);

      doc.autoTable({
        startY: 20,
        head: [tableColumn, subColumnas],
        body: tableRows,
        theme: 'grid',
        headStyles: { 
          fillColor: [0, 0, 0], 
          textColor: [255, 255, 255],
          fontStyle: 'bold',
          fontSize: 7
        },
        styles: { 
          fontSize: 6,
          cellPadding: 1.5,
          lineColor: [0, 0, 0],
          lineWidth: 0.2
        },
        columnStyles: {
          0: { cellWidth: 8 },
          1: { cellWidth: 45 },
          2: { cellWidth: 10 },
          3: { cellWidth: 14, halign: 'right' },
          4: { cellWidth: 14, halign: 'right' },
          5: { cellWidth: 12, halign: 'right' },
          6: { cellWidth: 18, halign: 'right' },
          7: { cellWidth: 12, halign: 'right' },
          8: { cellWidth: 18, halign: 'right' },
          9: { cellWidth: 12, halign: 'right' },
          10: { cellWidth: 14, halign: 'right' },
          11: { cellWidth: 12, halign: 'right' },
          12: { cellWidth: 18, halign: 'right' },
          13: { cellWidth: 12, halign: 'right' },
          14: { cellWidth: 18, halign: 'right' }
        },
        margin: { left: 5, right: 5 }
      });

      doc.save(`IPV_TOTALES_${now.toISOString().slice(0,10)}.pdf`);
    }

    // ========== INICIALIZACIÓN ==========
    cargarDatos();
    renderAll();
    setTimeout(setupEventListeners, 200);

    document.getElementById('downloadPdfBtn').addEventListener('click', downloadPDF);
    document.getElementById('saveManualBtn').addEventListener('click', guardarDatos);
    document.getElementById('resetCeroBtn').addEventListener('click', resetToCero);
    document.getElementById('resetDataBtn').addEventListener('click', resetAllData);
    document.getElementById('addProductBtn').addEventListener('click', addNewProduct);

    window.addEventListener('beforeunload', guardarDatos);
  })();
</script>
</body>
</html>
