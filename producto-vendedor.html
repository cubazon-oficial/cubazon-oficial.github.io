<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Producto de vendedor · CUBAZON</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: #0f1111;
            line-height: 1.5;
        }
        
        /* Header */
        #header-wrap {
            background: #131921;
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-header {
            padding: 10px 20px;
        }
        .container.row {
            max-width: 1500px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-logo img {
            height: 50px;
            width: auto;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }
        .right-menu ul {
            display: flex;
            gap: 20px;
            list-style: none;
            align-items: center;
        }
        .right-menu ul li a {
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sora-cart {
            position: relative;
        }
        .sora-cart-details {
            display: flex;
            align-items: center;
            color: white;
            cursor: pointer;
        }
        .sora-cart-details:after {
            content: '\f290';
            font-family: 'FontAwesome';
            font-size: 24px;
            margin-left: 5px;
        }
        .simpleCart_quantity {
            background: #f08804;
            color: #0f1111;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 5px;
        }
        .header-menu {
            background: #232f3e;
            padding: 0 20px;
        }
        #main-menu ul {
            display: flex;
            list-style: none;
            gap: 20px;
        }
        #main-menu ul li a {
            color: white;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 0;
            display: block;
        }
        
        /* Contenedor principal */
        .producto-container {
            max-width: 1200px;
            margin: 50px auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        /* ===== ALERTA DE SEGURIDAD ===== */
        .alerta-seguridad {
            background: #fff3cd;
            border-left: 6px solid #dc3545;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
            box-shadow: 0 4px 10px rgba(220,53,69,0.1);
            animation: pulse-alerta 2s infinite;
        }
        
        @keyframes pulse-alerta {
            0% { box-shadow: 0 4px 10px rgba(220,53,69,0.1); }
            50% { box-shadow: 0 4px 20px rgba(220,53,69,0.3); }
            100% { box-shadow: 0 4px 10px rgba(220,53,69,0.1); }
        }
        
        .alerta-icono {
            font-size: 40px;
            color: #dc3545;
            flex-shrink: 0;
        }
        
        .alerta-contenido h3 {
            color: #856404;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .alerta-contenido p {
            color: #856404;
            margin-bottom: 8px;
            font-size: 15px;
        }
        
        .alerta-contenido ul {
            margin: 10px 0 0 20px;
            color: #856404;
        }
        
        .alerta-contenido li {
            margin-bottom: 5px;
        }
        
        /* ===== BADGE DE VENDEDOR EXTERNO ===== */
        .badge-externo {
            display: inline-block;
            background: #6c757d;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .badge-externo i {
            margin-right: 5px;
        }
        
        /* Badge de verificación */
        .badge-verificado {
            display: inline-block;
            background: #28a745;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .badge-no-verificado {
            display: inline-block;
            background: #ffc107;
            color: #856404;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        /* Grid de producto */
        .producto-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }
        
        .producto-imagen {
            width: 100%;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ddd;
            border-radius: 12px;
            overflow: hidden;
            background: #f8f9fa;
        }
        
        .producto-imagen img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .producto-info h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #0f1111;
        }
        
        .producto-precio {
            font-size: 36px;
            font-weight: 700;
            color: #b12704;
            margin-bottom: 20px;
        }
        
        .producto-precio small {
            font-size: 16px;
            font-weight: 400;
            color: #6c757d;
            margin-left: 5px;
        }
        
        .producto-stock {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
        }
        
        .stock-available {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .stock-low {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        
        .stock-out {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .producto-descripcion {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin: 30px 0;
            border: 1px solid #dee2e6;
        }
        
        .producto-descripcion h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #0f1111;
        }
        
        .producto-descripcion p {
            color: #6c757d;
            line-height: 1.8;
            white-space: pre-line;
        }
        
        /* Tarjeta del vendedor */
        .vendedor-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px;
            padding: 25px;
            margin-top: 30px;
        }
        
        .vendedor-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .vendedor-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }
        
        .vendedor-info {
            flex: 1;
        }
        
        .vendedor-info h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .vendedor-info p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .vendedor-detalles {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .vendedor-detalle-item {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .vendedor-detalle-item i {
            font-size: 18px;
            width: 24px;
        }
        
        /* ===== ESTILOS MEJORADOS PARA DOMICILIO ===== */
        .vendedor-detalle-item.domicilio-info {
            background: rgba(255,255,255,0.15);
            border-left: 4px solid;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .vendedor-detalle-item.domicilio-info.no-domicilio {
            background: rgba(220, 53, 69, 0.15);
            border-left-color: #dc3545;
        }

        .vendedor-detalle-item.domicilio-info i.fa {
            font-size: 24px;
            align-self: flex-start;
            margin-top: 2px;
        }

        .domicilio-contenido {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .domicilio-label {
            font-size: 14px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .domicilio-texto {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            color: white;
        }

        .domicilio-badge-no {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #dc3545;
            color: white;
            padding: 8px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 5px;
            width: fit-content;
            box-shadow: 0 2px 8px rgba(220,53,69,0.3);
            animation: pulse-no-domicilio 2s infinite;
        }

        @keyframes pulse-no-domicilio {
            0% { box-shadow: 0 2px 8px rgba(220,53,69,0.3); }
            50% { box-shadow: 0 4px 15px rgba(220,53,69,0.5); }
            100% { box-shadow: 0 2px 8px rgba(220,53,69,0.3); }
        }

        /* Mejora para dirección */
        .vendedor-detalle-item.direccion-completa {
            background: rgba(255,255,255,0.1);
            border-left: 4px solid #ffc107;
            padding: 15px;
            grid-column: span 2;
        }

        .direccion-contenido {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex: 1;
        }

        .direccion-label {
            font-size: 14px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .direccion-texto {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.5;
            color: white;
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            border-radius: 8px;
            word-break: break-word;
        }

        .direccion-nota {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #17a2b8;
            color: white;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 5px;
            width: fit-content;
        }
        
        .btn-whatsapp {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
            margin-top: 15px;
        }
        
        .btn-whatsapp:hover {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37,211,102,0.3);
        }
        
        .producto-etiquetas {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        
        .producto-etiqueta {
            background: #e9ecef;
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 13px;
            color: #495057;
        }
        
        /* ===== DESCARGO DE RESPONSABILIDAD ===== */
        .descargo {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 12px;
            padding: 25px;
            margin-top: 40px;
            font-size: 14px;
            color: #6c757d;
            border-left: 4px solid #6c757d;
        }
        
        .descargo h4 {
            color: #495057;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .descargo h4 i {
            color: #6c757d;
        }
        
        .descargo p {
            margin-bottom: 10px;
            line-height: 1.6;
        }
        
        .descargo ul {
            margin: 10px 0 0 20px;
        }
        
        .descargo li {
            margin-bottom: 5px;
        }
        
        .descargo strong {
            color: #495057;
        }
        
        /* Loading y error */
        .loading {
            text-align: center;
            padding: 80px 20px;
        }
        
        .loading i {
            font-size: 64px;
            color: #009644;
            margin-bottom: 20px;
        }
        
        .error-container {
            text-align: center;
            padding: 80px 20px;
        }
        
        .error-container i {
            font-size: 64px;
            color: #dc3545;
            margin-bottom: 20px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #ffd814;
            color: #0f1111;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
        }
        
        /* Footer */
        #footer-wrapper {
            background: #232f3e;
            color: white;
            padding: 50px 20px;
            margin-top: 50px;
        }
        .footer-widgets-wrap {
            max-width: 1500px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }
        #sub-footer-wrapper {
            background: #131921;
            padding: 20px;
            text-align: center;
            color: #ddd;
        }
        
        @media (max-width: 768px) {
            .producto-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .producto-imagen {
                height: 300px;
            }
            
            .producto-info h1 {
                font-size: 24px;
            }
            
            .producto-precio {
                font-size: 28px;
            }
            
            .vendedor-detalles {
                grid-template-columns: 1fr;
            }
            
            .alerta-seguridad {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            
            .alerta-icono {
                margin-bottom: 10px;
            }
            
            .domicilio-texto {
                font-size: 16px;
            }
            
            .vendedor-detalle-item.domicilio-info i.fa {
                font-size: 20px;
            }
            
            .direccion-texto {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div id="header-wrap">
        <div class="header-header">
            <div class="container row">
                <div class="header-logo">
                    <a href="/">
                        <img src="http://imgfz.com/i/oXOfVlT.png" alt="CUBAZON" style="height: 50px;">
                    </a>
                </div>
                <div class="header-right">
                    <div class="right-menu">
                        <ul>
                            <li><a href="/login.html" id="userMenuLink">
                                <i class="fa fa-sign-in"></i> 
                                <span id="userMenuText">Iniciar sesión</span>
                            </a></li>
                            <li><a href="/p/cart.html"><i class="fa fa-shopping-cart"></i> <span id="cart-counter" class="simpleCart_quantity">0</span></a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
        <div class="header-menu">
            <div class="container row">
                <div id="main-menu">
                    <ul>
                        <li><a href="/">Inicio</a></li>
                        <li><a href="/mi-cuenta.html">Mi Cuenta</a></li>
                        <li><a href="/buscar.html">Buscar</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="producto-container">
        <div id="loadingIndicator" class="loading">
            <i class="fa fa-spinner fa-pulse"></i>
            <h2>Cargando producto...</h2>
        </div>
        
        <div id="errorMessage" class="error-container" style="display: none;">
            <i class="fa fa-exclamation-triangle"></i>
            <h2>Producto no encontrado</h2>
            <p>El producto que buscas no existe o no está disponible.</p>
            <a href="/" class="btn">Volver al inicio</a>
        </div>
        
        <div id="productoContent" style="display: none;"></div>
    </div>

    <!-- FOOTER -->
    <div id="footer-wrapper">
        <div class="footer-widgets-wrap">
            <div class="footer">
                <h3>CUBAZON</h3>
                <p>Tu tienda online de confianza en Sagua de Tánamo.</p>
            </div>
        </div>
    </div>
    <div id="sub-footer-wrapper">
        <p>@Copyright 2026 CUBAZON</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module">
        import { supabase } from '/js/supabase-client.js';
        import { auth } from '/js/auth.js';
        import { initCarrito } from '/js/cart.js';
        
        // Inicializar carrito
        const carrito = initCarrito();
        window.cart = carrito;
        carrito.cargarDeLocalStorage();
        carrito.actualizarInterfaz();
        
        // Obtener ID de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const productoId = urlParams.get('id');
        
        // Elementos DOM
        const loadingIndicator = document.getElementById('loadingIndicator');
        const errorMessage = document.getElementById('errorMessage');
        const productoContent = document.getElementById('productoContent');
        
        // ========== REGISTRAR VISITA ==========
        async function registrarVisita(productoId, vendedorId) {
            try {
                let ip = null;
                try {
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    ip = ipData.ip;
                } catch (e) {
                    console.log('No se pudo obtener IP');
                }
                
                await supabase
                    .from('visitas_producto')
                    .insert({
                        producto_id: productoId,
                        vendedor_id: vendedorId,
                        visitante_ip: ip,
                        user_agent: navigator.userAgent
                    });
                    
                console.log('✅ Visita registrada');
            } catch (error) {
                console.log('Error registrando visita:', error);
            }
        }

        // ========== REGISTRAR CLIC EN WHATSAPP ==========
        async function registrarClic(productoId, vendedorId) {
            try {
                let ip = null;
                try {
                    const ipResponse = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipResponse.json();
                    ip = ipData.ip;
                } catch (e) {}
                
                await supabase
                    .from('clics_whatsapp')
                    .insert({
                        producto_id: productoId,
                        vendedor_id: vendedorId,
                        visitante_ip: ip
                    });
                    
                console.log('✅ Clic registrado');
            } catch (error) {
                console.log('Error registrando clic:', error);
            }
        }

        // ========== FUNCIÓN GLOBAL PARA CLIC + WHATSAPP ==========
        window.contactarWhatsApp = async function(productoId, vendedorId, telefono, mensaje) {
            await registrarClic(productoId, vendedorId);
            window.open(`https://wa.me/${telefono}?text=${mensaje}`, '_blank');
        };
        
        // ========== ACTUALIZAR MENÚ DE USUARIO ==========
        function actualizarMenuUsuario() {
            const userMenuLink = document.getElementById('userMenuLink');
            const userMenuText = document.getElementById('userMenuText');
            
            if (!userMenuLink || !userMenuText) return;
            
            if (auth.isAuthenticated()) {
                const usuario = auth.getUsuario();
                const nombre = usuario?.nombre_completo || usuario?.email?.split('@')[0] || 'Mi cuenta';
                userMenuText.textContent = nombre;
                userMenuLink.href = '/mi-cuenta.html';
                userMenuLink.innerHTML = `<i class="fa fa-user"></i> ${nombre}`;
            } else {
                userMenuText.textContent = 'Iniciar sesión';
                userMenuLink.href = '/login.html';
                userMenuLink.innerHTML = '<i class="fa fa-sign-in"></i> Iniciar sesión';
            }
        }
        
        // ========== CARGAR PRODUCTO ==========
        async function cargarProducto() {
            if (!productoId) {
                mostrarError();
                return;
            }
            
            try {
                const { data, error } = await supabase
                    .from('productos_vendedor')
                    .select(`
                        *,
                        vendedor:vendedores(
                            id,
                            nombre_tienda,
                            descripcion_tienda,
                            direccion,
                            telefono_contacto,
                            whatsapp_contacto,
                            logo_url,
                            provincia,
                            municipio,
                            ofrece_domicilio,
                            tipo_domicilio,
                            provincia_domicilio,
                            municipio_domicilio,
                            estado_verificacion
                        )
                    `)
                    .eq('id', productoId)
                    .eq('activo', true)
                    .single();
                
                if (error || !data) {
                    throw new Error('Producto no encontrado');
                }
                
                renderizarProducto(data);
                
                // Registrar visita
                if (data && data.vendedor) {
                    await registrarVisita(data.id, data.vendedor.id);
                }
                
            } catch (error) {
                console.error('Error:', error);
                mostrarError();
            }
        }
        
        // ========== RENDERIZAR PRODUCTO ==========
        function renderizarProducto(p) {
            loadingIndicator.style.display = 'none';
            productoContent.style.display = 'block';
            
            let stockClass = 'stock-available';
            let stockText = `✅ Stock disponible: ${p.stock} unidades`;
            
            if (p.stock <= 0) {
                stockClass = 'stock-out';
                stockText = '❌ AGOTADO';
            } else if (p.stock <= 5) {
                stockClass = 'stock-low';
                stockText = `⚠️ Stock bajo: ${p.stock} unidades`;
            }
            
            // Determinar texto de domicilio
            let domicilioTexto = '';
            let domicilioIcono = '';
            let domicilioColor = '';
            
            if (!p.vendedor.ofrece_domicilio) {
                domicilioTexto = 'No ofrece servicio de domicilio';
                domicilioIcono = 'fa-times-circle';
                domicilioColor = '#dc3545';
            } else {
                switch(p.vendedor.tipo_domicilio) {
                    case 'todo_cuba':
                        domicilioTexto = '🌍 Domicilio en todo el país';
                        domicilioIcono = 'fa-globe';
                        domicilioColor = '#28a745';
                        break;
                    case 'provincia':
                        domicilioTexto = `📍 Domicilio en ${p.vendedor.provincia_domicilio}`;
                        domicilioIcono = 'fa-map-marker';
                        domicilioColor = '#17a2b8';
                        break;
                    case 'municipio':
                        domicilioTexto = `🏘️ Domicilio en ${p.vendedor.municipio_domicilio}, ${p.vendedor.provincia_domicilio}`;
                        domicilioIcono = 'fa-home';
                        domicilioColor = '#ffc107';
                        break;
                    default:
                        domicilioTexto = 'Información de domicilio no disponible';
                        domicilioIcono = 'fa-question-circle';
                        domicilioColor = '#6c757d';
                }
            }
            
            // Badge de verificación
            let verificacionBadge = '';
            if (p.vendedor.estado_verificacion === 'verificado') {
                verificacionBadge = '<span class="badge-verificado"><i class="fa fa-check-circle"></i> Vendedor Verificado</span>';
            } else if (p.vendedor.estado_verificacion === 'pendiente') {
                verificacionBadge = '<span class="badge-no-verificado"><i class="fa fa-clock-o"></i> Verificación pendiente</span>';
            } else if (p.vendedor.estado_verificacion === 'rechazado') {
                verificacionBadge = '<span class="badge-no-verificado" style="background:#dc3545; color:white;"><i class="fa fa-exclamation-triangle"></i> Vendedor no verificado</span>';
            } else {
                verificacionBadge = '<span class="badge-no-verificado"><i class="fa fa-exclamation-triangle"></i> No verificado</span>';
            }
            
            // Generar mensaje de WhatsApp
            const mensaje = encodeURIComponent(
                `Hola, me interesa tu producto *${p.nombre}* de *${p.vendedor.nombre_tienda}*.\n` +
                `Precio: $${p.precio.toFixed(2)} CUP\n` +
                `Ubicación del vendedor: ${p.vendedor.municipio}, ${p.vendedor.provincia}\n` +
                `Domicilio: ${domicilioTexto}\n` +
                `Stock: ${p.stock} unidades\n` +
                `¿Podemos coordinar la compra? (Recuerda: solo pago contra entrega)`
            );
            
            productoContent.innerHTML = `
                <!-- ALERTA DE SEGURIDAD -->
                <div class="alerta-seguridad">
                    <div class="alerta-icono">
                        <i class="fa fa-exclamation-triangle"></i>
                    </div>
                    <div class="alerta-contenido">
                        <h3>⚠️ ¡IMPORTANTE! PROTÉGETE DE ESTAFAS</h3>
                        <p><strong>Este producto es vendido por un vendedor externo, NO por CUBAZON directamente.</strong></p>
                        <ul>
                            <li><i class="fa fa-times-circle" style="color: #dc3545;"></i> <strong>NUNCA pagues por adelantado</strong> antes de recibir el producto.</li>
                            <li><i class="fa fa-check-circle" style="color: #28a745;"></i> <strong>Solo paga cuando tengas el producto en tus manos</strong> (contra entrega).</li>
                            <li><i class="fa fa-search"></i> Revisa bien el producto antes de entregar el dinero.</li>
                            <li><i class="fa fa-store"></i> CUBAZON solo facilita el contacto entre compradores y vendedores.</li>
                        </ul>
                    </div>
                </div>
                
                <span class="badge-externo">
                    <i class="fa fa-store"></i> VENDEDOR EXTERNO
                    ${verificacionBadge}
                </span>
                
                <div class="producto-grid">
                    <div class="producto-imagen">
                        <img src="${p.imagen_url || '/assets/images/no-image.jpg'}" 
                             alt="${p.nombre}"
                             onerror="this.src='/assets/images/no-image.jpg'">
                    </div>
                    
                    <div class="producto-info">
                        <h1>${p.nombre}</h1>
                        
                        <div class="producto-precio">
                            $${p.precio.toFixed(2)} <small>CUP</small>
                        </div>
                        
                        <div class="producto-stock ${stockClass}">
                            <i class="fa ${p.stock <= 0 ? 'fa-ban' : (p.stock <= 5 ? 'fa-exclamation-triangle' : 'fa-check-circle')}"></i> 
                            ${stockText}
                        </div>
                        
                        <div class="producto-descripcion">
                            <h3>Descripción</h3>
                            <p>${p.descripcion || 'El vendedor no ha proporcionado una descripción para este producto.'}</p>
                        </div>
                        
                        ${p.etiquetas && p.etiquetas.length > 0 ? `
                            <div class="producto-etiquetas">
                                ${p.etiquetas.map(e => `<span class="producto-etiqueta">${e}</span>`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
                
                <!-- Tarjeta del vendedor con estilos mejorados -->
                <div class="vendedor-card">
                    <div class="vendedor-header">
                        <div class="vendedor-icon">
                            <i class="fa fa-store"></i>
                        </div>
                        <div class="vendedor-info">
                            <h3>${p.vendedor.nombre_tienda}</h3>
                            <p>Vendedor externo en CUBAZON</p>
                        </div>
                    </div>
                    
                    <div class="vendedor-detalles">
                        ${p.vendedor.provincia ? `
                            <div class="vendedor-detalle-item">
                                <i class="fa fa-map-marker"></i>
                                <span><strong>Ubicación:</strong> ${p.vendedor.municipio}, ${p.vendedor.provincia}</span>
                            </div>
                        ` : ''}
                        
                        <!-- SECCIÓN DE DOMICILIO MEJORADA -->
                        <div class="vendedor-detalle-item domicilio-info ${!p.vendedor.ofrece_domicilio ? 'no-domicilio' : ''}">
                            <i class="fa ${domicilioIcono}"></i>
                            <div class="domicilio-contenido">
                                <span class="domicilio-label"><strong>Domicilio:</strong></span>
                                <span class="domicilio-texto">${domicilioTexto}</span>
                                ${!p.vendedor.ofrece_domicilio ? `
                                    <span class="domicilio-badge-no">
                                        <i class="fa fa-info-circle"></i> Solo recogida en tienda
                                    </span>
                                ` : ''}
                            </div>
                        </div>
                        
                        ${p.vendedor.telefono_contacto ? `
                            <div class="vendedor-detalle-item">
                                <i class="fa fa-phone"></i>
                                <span><strong>Teléfono:</strong> ${p.vendedor.telefono_contacto}</span>
                            </div>
                        ` : ''}
                        
                        ${p.vendedor.direccion ? `
                            <div class="vendedor-detalle-item direccion-completa">
                                <i class="fa fa-home"></i>
                                <div class="direccion-contenido">
                                    <span class="direccion-label"><strong>Dirección:</strong></span>
                                    <span class="direccion-texto">${p.vendedor.direccion}</span>
                                    ${!p.vendedor.ofrece_domicilio ? `
                                        <span class="direccion-nota">
                                            <i class="fa fa-exclamation-circle"></i> Dirección para recogida en tienda
                                        </span>
                                    ` : ''}
                                </div>
                            </div>
                        ` : ''}
                        
                        ${p.vendedor.descripcion_tienda ? `
                            <div class="vendedor-detalle-item" style="grid-column: span 2;">
                                <i class="fa fa-align-left"></i>
                                <span>${p.vendedor.descripcion_tienda}</span>
                            </div>
                        ` : ''}
                    </div>
                    
                    <a href="javascript:void(0)" 
                       onclick="contactarWhatsApp('${p.id}', '${p.vendedor.id}', '${p.vendedor.whatsapp_contacto}', '${mensaje}')" 
                       class="btn-whatsapp">
                        <i class="fa fa-whatsapp"></i> Contactar vendedor por WhatsApp
                    </a>
                </div>
                
                <!-- DESCARGO DE RESPONSABILIDAD -->
                <div class="descargo">
                    <h4><i class="fa fa-gavel"></i> Aviso legal y descargo de responsabilidad</h4>
                    <p><strong>CUBAZON es una plataforma que únicamente presta servicios de publicidad y contacto entre vendedores externos y compradores.</strong> No participamos en las transacciones, no almacenamos productos, no realizamos cobros ni gestionamos pagos entre las partes.</p>
                    <p>Por lo tanto:</p>
                    <ul>
                        <li><strong>No nos responsabilizamos</strong> por la calidad, autenticidad, entrega o cualquier problema relacionado con los productos ofrecidos por vendedores externos.</li>
                        <li><strong>No intervenimos</strong> en disputas entre compradores y vendedores.</li>
                        <li><strong>Recomendamos encarecidamente</strong> realizar todas las transacciones en efectivo contra entrega y verificar el producto antes de pagar.</li>
                        <li><strong>Cualquier acuerdo, pago o entrega</strong> es responsabilidad exclusiva del comprador y del vendedor.</li>
                    </ul>
                    <p style="margin-top: 15px; font-style: italic;">Al contactar a un vendedor a través de esta plataforma, aceptas estos términos y eximes a CUBAZON de toda responsabilidad derivada de la transacción.</p>
                </div>
            `;
        }
        
        // ========== MOSTRAR ERROR ==========
        function mostrarError() {
            loadingIndicator.style.display = 'none';
            errorMessage.style.display = 'block';
        }
        
        // ========== INICIALIZAR ==========
        actualizarMenuUsuario();
        auth.onCambio(actualizarMenuUsuario);
        cargarProducto();
    </script>
</body>
</html>
