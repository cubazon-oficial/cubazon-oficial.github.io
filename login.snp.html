<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso con teléfono · CUBAZON</title>
    
    <!-- Fonts y estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: slideUp 0.6s ease-out;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header img {
            height: 70px;
            margin-bottom: 20px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-bottom: 15px;
        }
        .btn-google {
            background: white;
            color: #757575;
            border: 2px solid #e2e8f0;
        }
        .btn-google:hover {
            background: #f8f9fa;
            border-color: #667eea;
        }
        .btn-google img {
            width: 20px;
            height: 20px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: #a0aec0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 2px solid #e2e8f0;
        }
        .divider span {
            padding: 0 20px;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2d3748;
        }
        .form-control {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 15px;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        .input-group .prefix {
            background: #edf2f7;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-weight: 600;
            color: #4a5568;
        }
        .footer-links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }
        .footer-links a {
            color: #718096;
            text-decoration: none;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <img src="http://imgfz.com/i/oXOfVlT.png" alt="CUBAZON">
            <h1>Acceso rápido</h1>
        </div>
        
        <!-- BOTÓN DE GOOGLE -->
        <button class="btn btn-google" id="googleLoginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Continuar con Google
        </button>
        
        <div class="divider">
            <span>o con tu teléfono</span>
        </div>
        
        <!-- PASO 1: Teléfono -->
        <div id="pasoTelefono">
            <div class="form-group">
                <label>Número de teléfono</label>
                <div class="input-group">
                    <span class="prefix">+53</span>
                    <input type="tel" id="telefono" class="form-control" placeholder="51234567" maxlength="8">
                </div>
            </div>
            <button class="btn btn-primary" id="telefonoBtn">Continuar</button>
        </div>
        
        <!-- PASO 2: Código -->
        <div id="pasoCodigo" style="display: none;">
            <div style="text-align: center; margin: 20px 0;">
                <i class="fa fa-telegram" style="font-size: 48px; color: #0088cc;"></i>
                <p>Código enviado a tu Telegram</p>
            </div>
            <input type="text" id="codigo" class="form-control" placeholder="Código de 6 dígitos" maxlength="6">
            <button class="btn btn-primary" id="verificarBtn" style="margin-top: 15px;">Verificar y acceder</button>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="reenviarLink">Reenviar código</a>
            </div>
        </div>
        
        <div class="footer-links">
            <a href="/login.html">Login con email</a>
            <a href="/registro.html">Registro</a>
        </div>
    </div>
    
    <script type="module">
        import { supabase } from '/js/supabase-client.js'
        import { auth } from '/js/auth.js'
        
        let telefonoActual = ''
        
        // Google
        document.getElementById('googleLoginBtn').addEventListener('click', async () => {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/index.html' }
            })
        })
        
        // Teléfono
        document.getElementById('telefonoBtn').onclick = async function() {
            const telefono = document.getElementById('telefono').value
            if (!/^\d{8}$/.test(telefono)) return alert('Teléfono inválido')
            
            telefonoActual = telefono
            const email = `${telefono}@telefono.cubazon`
            
            this.disabled = true
            this.innerHTML = '<i class="fa fa-spinner fa-pulse"></i> Enviando código...'
            
            const res = await auth.solicitarCodigoSinPassword(email, 'telegram')
            
            if (res.success) {
                document.getElementById('pasoTelefono').style.display = 'none'
                document.getElementById('pasoCodigo').style.display = 'block'
            } else {
                alert(res.error)
            }
            this.disabled = false
            this.innerHTML = 'Continuar'
        }
        
        document.getElementById('verificarBtn').onclick = async function() {
            const codigo = document.getElementById('codigo').value
            const email = `${telefonoActual}@telefono.cubazon`
            
            const res = await auth.validarCodigoSinPassword(email, codigo)
            if (res.success) window.location.href = '/index.html'
            else alert('Código incorrecto')
        }
    </script>
</body>
</html>
